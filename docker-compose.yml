services:
  mysql:
    image: mysql:8.0
    container_name: jarvis-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_resume}
      TZ: Asia/Shanghai
    volumes:
      - jarvis-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jarvis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: jarvis-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-jarvis}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env}
      TZ: Asia/Shanghai
    volumes:
      - jarvis-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  jarvis-api:
    image: jarvis-api:local
    container_name: jarvis-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8084
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_resume}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ""
      SPRING_DATA_REDIS_DATABASE: 0
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-jarvis}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env}
      JARVIS_SECURITY_KEY: ${JARVIS_SECURITY_KEY:?set JARVIS_SECURITY_KEY in .env}
      JARVIS_SECURITY_EXPIRE_HOURS: ${JARVIS_SECURITY_EXPIRE_HOURS:-168}
      JARVIS_LLM_PROVIDER: ${JARVIS_LLM_PROVIDER:-gpt}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_WIRE_API: ${OPENAI_WIRE_API:-chat}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-120}
      BIGMODEL_API_KEY: ${BIGMODEL_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QIANFAN_OPENAI_API_KEY: ${QIANFAN_OPENAI_API_KEY:-}
      OPENVIKING_BASE_URL: ${OPENVIKING_BASE_URL:-}
      OPENVIKING_API_KEY: ${OPENVIKING_API_KEY:-}
      OPENVIKING_ACCOUNT: ${OPENVIKING_ACCOUNT:-jarvis}
      OPENVIKING_USER: ${OPENVIKING_USER:-u-demo-001}
      OPENVIKING_AGENT: ${OPENVIKING_AGENT:-jarvis}
      OPENVIKING_PROVISIONING_REQUIRED: ${OPENVIKING_PROVISIONING_REQUIRED:-true}
      OPENVIKING_SESSION_ENABLED: ${OPENVIKING_SESSION_ENABLED:-false}
      OPENVIKING_RECALL_ENABLED: ${OPENVIKING_RECALL_ENABLED:-false}
      JARVIS_MCP_ENABLED: ${JARVIS_MCP_ENABLED:-false}
      JARVIS_MCP_FAIL_FAST: ${JARVIS_MCP_FAIL_FAST:-false}
      JARVIS_MCP_BIGMODEL_WEB_SEARCH_ENABLED: ${JARVIS_MCP_BIGMODEL_WEB_SEARCH_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_PROTOCOL: ${MAIL_PROTOCOL:-smtps}
      LANGCHAIN4J_HTTP_LOG_LEVEL: ${LANGCHAIN4J_HTTP_LOG_LEVEL:-WARN}
    ports:
      - "127.0.0.1:${JARVIS_API_PORT:-8084}:8084"

  jarvis-web:
    image: jarvis-web:local
    container_name: jarvis-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - jarvis-api
    ports:
      - "${JARVIS_WEB_PORT:-80}:80"

volumes:
  jarvis-mysql-data:
  jarvis-redis-data:
  jarvis-rabbitmq-data:
